<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注册 - 答题系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <h1>📝 答题系统</h1>
            <p style="color:#999;font-size:14px;margin-top:8px;">安全生产知识学习平台</p>
        </div>

        <div class="auth-card">
            <h2 style="text-align:center;margin-bottom:24px;">注册账号</h2>

            <form id="registerForm">
                <div class="form-group">
                    <label>昵称（选填）</label>
                    <input type="text" id="registerNickname" placeholder="请输入昵称">
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="registerPhone" placeholder="请输入手机号" maxlength="11">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="registerPassword" placeholder="请输入密码（至少6位）">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="confirmPassword" placeholder="请再次输入密码">
                </div>
                <button type="submit" class="btn btn-primary">注册</button>
            </form>

            <div class="auth-footer">
                已有账号？<a href="/login">立即登录</a>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
